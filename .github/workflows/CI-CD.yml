name: CI/CD

on:
  push:
    branches:
      - main
jobs:
  ci:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - run: echo "CI complete!"
  cd:
    needs: ci
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    if: github.ref == 'refs/heads/main' # Only run CD on pushes to main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper version tagging

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          # cache: "npm"

      - name: Configure Git for version tagging
        run: |
          git config user.name "gitHub-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          npm version patch -m "chore(release): Bump version to %s [skip ci]"

      - name: Push changes
        run: git push origin main --tags

      - name: Publish to npm
        run: npm publish --provenance --access public
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Only needed if not using Trusted
